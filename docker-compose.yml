services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cartera_sync
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cartera_sync"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  sync:
    build: .
    image: fedesoft-cartera-siigo:latest
    env_file: .env
    # Modo “siempre activo”: el contenedor corre en bucle y hace sync cada SYNC_INTERVAL_MINUTES.
    # Si no defines SYNC_INTERVAL_MINUTES en .env, el sync se ejecuta una vez y el contenedor termina.
    environment:
      APP_MODE: sync
    restart: "no"

  scheduler:
    build: .
    image: fedesoft-cartera-siigo:latest
    env_file: .env
    environment:
      APP_MODE: scheduler
      # Host `postgres` es el servicio en esta red; no uses localhost en .env dentro de Docker.
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cartera_sync
      # Todos los NIT con nit2 en HubSpot (anula TEST_ONLY_* del .env)
      TEST_ONLY_NIT: ""
      TEST_ONLY_NITS: ""
      SIIGO_INVOICES_MAX_PAGES: ""
      # Calendario: lun=1, mié=3 (0=dom … 6=sáb). Desde las 05:00 hora local, sin tope (quita END del .env o déjalo vacío).
      SCHEDULER_DAYS_OF_WEEK: "${SCHEDULER_DAYS_OF_WEEK:-1,3}"
      SCHEDULER_TIMEZONE: "${SCHEDULER_TIMEZONE:-America/Bogota}"
      SCHEDULER_WINDOW_START_HOUR: "${SCHEDULER_WINDOW_START_HOUR:-5}"
      SCHEDULER_WINDOW_START_MINUTE: "${SCHEDULER_WINDOW_START_MINUTE:-0}"
      SCHEDULER_WINDOW_END_HOUR: "${SCHEDULER_WINDOW_END_HOUR:-}"
      SCHEDULER_WINDOW_END_MINUTE: "${SCHEDULER_WINDOW_END_MINUTE:-}"
      SCHEDULER_CALENDAR_POLL_SECONDS: "${SCHEDULER_CALENDAR_POLL_SECONDS:-60}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    image: fedesoft-cartera-siigo:latest
    env_file: .env
    environment:
      APP_MODE: worker
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cartera_sync
      TEST_ONLY_NIT: ""
      TEST_ONLY_NITS: ""
      SIIGO_INVOICES_MAX_PAGES: ""
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
