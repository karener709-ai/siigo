services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cartera_sync
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cartera_sync"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  sync:
    build: .
    image: fedesoft-cartera-siigo:latest
    env_file: .env
    # Modo “siempre activo”: el contenedor corre en bucle y hace sync cada SYNC_INTERVAL_MINUTES.
    # Si no defines SYNC_INTERVAL_MINUTES en .env, el sync se ejecuta una vez y el contenedor termina.
    environment:
      APP_MODE: sync
    restart: "no"

  scheduler:
    build: .
    image: fedesoft-cartera-siigo:latest
    env_file: .env
    environment:
      APP_MODE: scheduler
      # Host `postgres` es el servicio en esta red; no uses localhost en .env dentro de Docker.
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cartera_sync
      TEST_ONLY_NIT: ""
      TEST_ONLY_NITS: ""
      SIIGO_INVOICES_MAX_PAGES: ""
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    image: fedesoft-cartera-siigo:latest
    env_file: .env
    environment:
      APP_MODE: worker
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cartera_sync
      TEST_ONLY_NIT: ""
      TEST_ONLY_NITS: ""
      SIIGO_INVOICES_MAX_PAGES: ""
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
